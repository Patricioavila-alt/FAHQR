<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crea tu código QR promocional único vinculado al Catálogo Extendido de Farmacias del Ahorro.">
    <title>Tu Cupón Digital — Farmacias del Ahorro</title>
    
    <!-- Fuente Corporativa: Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Librería para Código QR -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js" defer></script>
    
    <style>
        /* Variables y tokens de diseño (Brand Design System) */
        :root {
            --brand-primary:  #C8102E;      /* Rojo oficial */
            --brand-primary-hover: #a50d26;
            --brand-secondary: #001489;     /* Azul oficial */
            --brand-secondary-hover: #00107a;
            --brand-black: #000000;
            --brand-white: #FFFFFF;
            --background-body: #f4f6f9;
            --text-color: #000000;
            --surface-color: #ffffff;
            --border-color: #d1d5db;
            --border-radius: 8px;
            --border-radius-pill: 100px;    /* Pill shape para botones */
            --transition-speed: 0.2s;
        }

        /* Reseteo y Base */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Manrope', system-ui, -apple-system, sans-serif;
            background-color: var(--background-body); 
            color: var(--text-color); 
            margin: 0; 
            padding: 15px;
            line-height: 1.6;
        }
        .container { 
            width: 100%;
            max-width: 900px; 
            margin: 0 auto; 
        }

        /* Tipografía y Header */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--brand-white);
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .brand-logo {
            width: auto;
            height: 48px;
            flex-shrink: 0;
        }
        .brand-header-text { text-align: left; }
        .brand-header h1 { 
            color: var(--brand-secondary); 
            margin: 0 0 2px 0; 
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 800;
            line-height: 1.2;
        }
        .brand-header h1 span { color: var(--brand-primary); }
        .brand-header p { color: #6b7280; margin: 0; font-size: 0.85rem; font-weight: 500; }

        /* Contenedores Principales */
        .card-surface { 
            background: var(--surface-color); 
            padding: 30px; 
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07); 
            margin-bottom: 20px; 
            border-top: 4px solid var(--brand-secondary);
        }



        /* Formularios y Grids */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-weight: 700;
            margin-bottom: 6px; 
            font-size: 0.88em; 
            color: var(--brand-black);
            letter-spacing: 0.01em;
        }
        .form-control { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1.5px solid var(--border-color); 
            border-radius: var(--border-radius); 
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            background-color: var(--brand-white);
            color: var(--brand-black);
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed), background-color var(--transition-speed);
        }
        .form-control::placeholder { color: #9ca3af; }
        .form-control:hover { background-color: #f9fafb; border-color: #9ca3af; }
        .form-control:focus { 
            border-color: var(--brand-secondary); 
            outline: none; 
            background-color: var(--brand-white);
            box-shadow: 0 0 0 3px rgba(0, 20, 137, 0.12); 
        }

        /* Botones Acción - Pill Shape (Design System) */
        .btn {
            width: 100%; 
            padding: 16px 24px; 
            border-radius: var(--border-radius-pill); /* Pill shape */
            font-size: 1rem;
            border: none; 
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            cursor: pointer; 
            transition: background-color var(--transition-speed), transform 0.1s, box-shadow var(--transition-speed); 
            letter-spacing: 0.02em;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--brand-secondary); color: var(--brand-white); }
        .btn-primary:hover { background-color: var(--brand-secondary-hover); box-shadow: 0 4px 14px rgba(0, 20, 137, 0.25); }
        .btn-danger { background-color: var(--brand-primary); color: var(--brand-white); }
        .btn-danger:hover { background-color: var(--brand-primary-hover); }
        .btn:disabled { background-color: #e5e7eb; cursor: not-allowed; transform: none; box-shadow: none; color: #9ca3af; }

        /* Componente Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }
        .modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background-color: var(--surface-color);
            padding: 28px 24px;
            border-radius: 20px;
            width: 95%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0,0,0,0.18);
            transform: translateY(20px);
            transition: transform 0.3s;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }
        .modal.is-open .modal-content { transform: translateY(0); }
        
        .modal-btn-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            font-size: 1.5rem; color: #6b7280;
            cursor: pointer; padding: 4px; line-height: 1;
            border-radius: 50%;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            transition: background-color 0.2s;
        }
        .modal-btn-close:hover { background-color: #f3f4f6; color: var(--brand-black); }

        /* Contenedor Render QR */
        .qr-canvas-container {
            background-color: var(--surface-color);
            padding: 10px; /* Menor relleno para dejarle espacio a la img */
            display: flex; 
            justify-content: center;
            align-items: center;
            margin: 15px auto;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            width: 100%; 
            max-width: 270px; /* Limite nativo */
            aspect-ratio: 1/1; /* Siempre cuadrado! */
            overflow: hidden; /* Cortar cualquier desboramiento */
        }
        
        /* Auto Scaling del lienzo QR */
        .qr-canvas-container canvas, .qr-canvas-container svg {
            width: 100% !important;
            height: 100% !important;
            max-width: 250px;
            max-height: 250px;
            object-fit: contain;
        }

        /* Captcha container */
        .captcha-group {
            background: #f9fafb !important;
            border: 1.5px dashed var(--border-color) !important;
            border-radius: var(--border-radius) !important;
        }
        .captcha-group label { color: var(--brand-black); font-weight: 700; }

        /* URL feedback box */
        .url-feedback-box {
            font-size: 0.82em;
            color: #374151;
            background-color: #f9fafb;
            padding: 10px 14px;
            border-radius: var(--border-radius);
            word-break: break-all;
            margin-bottom: 20px;
            border: 1.5px solid #e5e7eb;
            text-align: left;
        }

        /* Responsive Layouts - Breakpoints Móviles a Desktop */
        @media(min-width: 576px) {
            .card-surface { padding: 36px; }
            .modal-content { padding: 36px 32px; width: 90%; }
        }

        @media(min-width: 768px) {
            body { padding: 40px; }
            .form-grid-2-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .brand-logo { max-width: 280px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<main class="container">
    <header class="brand-header">
        <img src="assets/images/logo.svg" alt="Farmacias del Ahorro" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-header-text">
            <h1>Tu Cupón <span>Digital</span></h1>
            <p>Genera y comparte tu código QR de promoción exclusiva del Catálogo Extendido</p>
        </div>
    </header>
    
    <section class="card-surface">
        <h2 style="color: var(--secondary-color); font-size: 1.2rem; margin-top:0;">¡Agrega tu ID multifuncional para generar tu QR!</h2>
        
        <form id="formRevisarUrl" onsubmit="event.preventDefault();" class="form-grid">
            <div class="form-group" style="display: none;">
                <label for="inputTestBaseUrl">URL Base (Esquema Deeplink)</label>
                <input type="url" id="inputTestBaseUrl" class="form-control" value="https://www.fahorro.com/catalogo-extendido/catalogo-extendido-lo-mas-vendido.html" readonly>
            </div>
            
            <div class="form-group">
                <label for="inputTestID">MultifuncionalID <span style="color:var(--primary-color);">*</span></label>
                <input type="text" id="inputTestID" class="form-control" placeholder="Ej: 12345" required minlength="3">
            </div>

            <div class="form-group captcha-group" style="margin-top: 15px; background: #fdfdfd; padding: 15px; border: 1px dashed var(--border-color); border-radius: var(--border-radius);">
                <label for="inputCaptchaTest">Verificación de Seguridad <span style="color:var(--primary-color);">*</span></label>
                <p style="font-size: 0.85em; color: #666; margin-top: 0; margin-bottom: 10px;">Resuelve la operación para habilitar la generación:</p>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="textCaptchaTest" style="font-size: 1.2rem; font-weight: bold; background: #e2e8f0; padding: 8px 12px; border-radius: 6px; letter-spacing: 2px;">?</span>
                    <span style="font-size: 1.2rem; font-weight: bold;">=</span>
                    <input type="number" id="inputCaptchaTest" class="form-control" style="width: 100px;" placeholder="Total" required>
                </div>
            </div>
            
            <button type="button" id="btnOpenPreview" class="btn btn-primary" style="margin-top: 20px;" disabled>
                Generar cupón QR
            </button>
        </form>
    </section>


</main>

<!-- MODAL EMERGENTE -->
<aside class="modal" id="qrPreviewModal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
    <div class="modal-content">
        <button type="button" class="modal-btn-close" id="btnCloseModal" aria-label="Cerrar ventana">×</button>
        <h3 id="modalTitle" style="color: var(--brand-secondary); margin-top: 0;">¡Tu Cupón está listo!</h3>
        
        <div class="qr-canvas-container" id="qrDomContainer">
            <!-- Render Target para SVG -->
        </div>

        <div class="url-feedback-box" id="textUrlFeedback" style="font-size: 1rem; font-weight: 700; color: var(--brand-secondary); letter-spacing: 0.03em;">
            &mdash;
        </div>
        
        <button type="button" id="btnDownloadSingle" class="btn btn-primary">
            Descargar imagen
        </button>
    </div>
</aside>

<!-- LÓGICA DE LA APLICACIÓN -->
<script>
document.addEventListener('DOMContentLoaded', () => {



    /** 
     * MANEJO DE ESTADO UI: Ventana Modal
     */
    const modal = document.getElementById('qrPreviewModal');
    const btnCloseModal = document.getElementById('btnCloseModal');

    const openModal = () => {
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
    };
    
    const closeModal = () => {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
    };

    btnCloseModal.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal(); // Cierra si hace clic fuera
    });

    /** 
     * DOM ELEMENTS - CACHÉ LÓGICO
     */
    // Entradas UI
    const inputBaseUrl = document.getElementById('inputTestBaseUrl');
    const inputID = document.getElementById('inputTestID');
    const textFeedback = document.getElementById('textUrlFeedback');
    const inputCaptchaTest = document.getElementById('inputCaptchaTest');
    const textCaptchaTest = document.getElementById('textCaptchaTest');

    // Botones Acción Principal
    const btnPreview = document.getElementById('btnOpenPreview');
    const btnDownload = document.getElementById('btnDownloadSingle');

    /**
     * CONFIGURACIÓN E INSTANCIAS QR (Librería Externa)
     */
    const brandColors = {
        primary: "#E3182D",   // Rojo
        secondary: "#2C3C8F", // Azul
        background: "#FFFFFF",
        black: "#000000"
    };

    const qrBaseSettings = {
        type: "svg", 
        data: "fahorro://", 
        margin: 10,
        qrOptions: { mode: "Byte", errorCorrectionLevel: "M" },
        imageOptions: { hideBackgroundDots: true, imageSize: 0.4, margin: 0 },
        backgroundOptions: { color: brandColors.background },
        dotsOptions: { color: brandColors.secondary, type: "square" }, // Puntos azules
        cornersSquareOptions: { color: brandColors.primary, type: "square" }, // Bordes Rojos
        cornersDotOptions: { color: brandColors.primary, type: "square" } // Centro rojo
    };

    // Instancia para Modal
    let qrPreviewInstance = null;

    // Inicialización Retardada para evitar parpadeos
    const initQrEngines = () => {
        if (typeof QRCodeStyling !== "undefined") {
            qrPreviewInstance = new QRCodeStyling({ ...qrBaseSettings, width: 250, height: 250 });
            qrPreviewInstance.append(document.getElementById('qrDomContainer'));
        } else {
            console.error("Librería QRCodeStyling no disponible.");
            alert("Error cargando el motor de renderizado QR. Revisa tu conexión.");
        }
    };
    
    // Asignar carga
    window.onload = initQrEngines;

    /** 
     * CORE UTIL: URL Builder
     * Combina una URL Base segura con parámetros sanitizados.
     */
    const createSafeDeepLink = (baseUrl, paramsObj) => {
        try {
            const params = new URLSearchParams();
            // Iterar y agregar solo propiedades existentes y no vacías
            for (const [key, value] of Object.entries(paramsObj)) {
                if (value && String(value).trim() !== '') {
                    params.append(key, String(value).trim());
                }
            }
            
            const stringifiedParams = params.toString();
            if(!stringifiedParams) return baseUrl.trim();
            
            const separator = baseUrl.includes('?') ? '&' : '?';
            return `${baseUrl.trim()}${separator}${stringifiedParams}`;
        } catch (error) {
            console.error("Error validando la URL", error);
            return baseUrl; // Fallback seguro
        }
    };

    /**
     * LÓGICA CAPTCHA MATEMÁTICO
     */
    let captchaAnswer = 0;
    
    const generateCaptcha = (textEl) => {
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        const op = Math.random() > 0.5 ? '+' : '-';
        if (op === '-' && num1 < num2) {
            textEl.innerText = `${num2} - ${num1}`;
            captchaAnswer = num2 - num1;
        } else {
            textEl.innerText = `${num1} ${op} ${num2}`;
            captchaAnswer = op === '+' ? num1 + num2 : num1 - num2;
        }
    };
    
    // Inicializar valores de seguridad en UI
    generateCaptcha(textCaptchaTest);

    /**
     * EVENTO: Validar UI y habilitar botones si Captcha y Datos son correctos
     */
    const validateTestUI = () => {
        const isValidId = inputID.value.trim().length >= 3;
        const isValidCaptcha = parseInt(inputCaptchaTest.value, 10) === captchaAnswer;
        btnPreview.disabled = !(isValidId && isValidCaptcha);
    };
    
    inputID.addEventListener('input', validateTestUI);
    inputCaptchaTest.addEventListener('input', validateTestUI);

    /**
     * EVENTO: Generar Singular
     */
    btnPreview.addEventListener('click', () => {
        if (!qrPreviewInstance) return;
        
        if (!inputID.value.trim()) {
            return alert("Por favor, ingresa un MultifuncionalID válido para generar la prueba.");
        }

        const payload = {
            cupon: "Cupon50%", // Fijo
            multifuncionalID: inputID.value
        };

        const finalUrl = createSafeDeepLink(inputBaseUrl.value, payload);
        
        qrPreviewInstance.update({ data: finalUrl });
        textFeedback.innerText = `ID: ${inputID.value.trim()}`;
        
        openModal();
    });

    /**
     * EVENTO: Descargar Prueba Singular
     */
    btnDownload.addEventListener('click', () => {
        if (!qrPreviewInstance) return;
        const idSafe = (inputID.value || 'Promo').replace(/[^a-zA-Z0-9]/g, '');
        const safeFilename = `${idSafe}_Fahorro_QR`;
        
        try {
            qrPreviewInstance.download({ name: safeFilename, extension: "png" });
        } catch (e) {
            alert("No se pudo exportar la imagen.");
            console.error(e);
        }
    });


});
</script>
</body>
</html>
